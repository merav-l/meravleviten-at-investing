<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Merav Leviten – Prototypes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 480px;
      width: 90%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.5px;
    }

    p {
      margin-top: 12px;
      color: #666;
      font-size: 1rem;
      line-height: 1.5;
    }

    .divider {
      margin: 32px auto;
      border: none;
      border-top: 1px solid #eee;
    }

    ul {
      list-style: none;
      text-align: left;
    }

    ul li {
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    ul li:last-child {
      border-bottom: none;
    }

    ul li a {
      color: #2563eb;
      text-decoration: none;
      font-size: 0.95rem;
    }

    ul li a:hover {
      text-decoration: underline;
    }

    .empty {
      color: #aaa;
      font-size: 0.9rem;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Merav Leviten</h1>
    <p>Product prototypes &amp; design explorations</p>
    <hr class="divider" />
    <ul>
      <!-- Add links here, e.g.:
      <li><a href="comments-redesign.html">Comments Redesign</a></li>
      -->
      <li class="empty">Prototypes coming soon</li>
    </ul>
  </div>
</body>
</html>
