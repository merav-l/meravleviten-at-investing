<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Community Sentiments - Redesign Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-page: #080B10;
    --bg-card: #0D1016;
    --bg-card-border: #1A1E27;
    --bg-inner: #151B24;
    --bg-inner-border: #2A2F38;
    --green: #6AC64C;
    --red: #E8443A;
    --red-spec: #E7544D;
    --text-primary: #FFFFFF;
    --text-gray: #949495;
    --divider: #2C3037;
  }

  html, body {
    background: var(--bg-page);
    min-height: 100vh;
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- PAGE LAYOUT ---- */
  .page {
    width: 390px;
    margin: 0 auto;
    padding: 32px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ---- CARD ---- */
  .card {
    width: 100%;
    background: var(--bg-card);
    border-radius: 16px;
    padding: 16px;
    position: relative;
  }

  /* ---- HEADER ---- */
  .card-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.4px;
    margin-bottom: 16px;
    line-height: normal;
  }

  /* ---- PRE-VOTE STATE ---- */
  .prevote-question {
    font-size: 14px;
    font-weight: 510;
    color: var(--text-primary);
    text-align: center;
    line-height: normal;
  }

  .prevote-hint {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-gray);
    text-align: center;
    line-height: normal;
    letter-spacing: 0;
  }

  /* ---- VOTE BUTTONS (circular) ---- */
  .vote-buttons {
    display: flex;
    gap: 20px;
    align-items: center;
    justify-content: center;
  }

  .vote-btn {
    width: 76px;
    height: 76px;
    border-radius: 100px;
    border: 2px solid transparent;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
    cursor: pointer;
    transition: transform 0.1s ease, opacity 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    outline: none;
    flex-shrink: 0;
  }

  .vote-btn:active { transform: scale(0.93); }
  .vote-btn:hover { opacity: 0.85; }

  .vote-btn.bear {
    border-color: var(--red-spec);
  }

  .vote-btn.bull {
    border-color: var(--green);
  }

  .vote-btn-icon { width: 48px; height: 48px; flex-shrink: 0; display: block; }

  /* ---- FOOTER LINK ---- */
  .footer-link {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 2px;
    opacity: 0.9;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .footer-link:active { opacity: 0.6; }

  /* ---- COMMUNITY BAR ---- */
  .bar-wrapper { margin-top: 16px; margin-bottom: 16px; }

  .bar-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .bar-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: block;
    transition: opacity 0.2s ease;
  }

  .bar-inner {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 0;
  }

  .bar-track {
    width: 100%;
    height: 4px;
    border-radius: 12px;
    display: flex;
    overflow: hidden;
    gap: 1.75px;
  }

  .bar-fill-bear {
    height: 100%;
    width: 12%;
    background: var(--red-spec);
    border-radius: 12px;
  }

  .bar-fill-bull {
    height: 100%;
    flex: 1;
    background: var(--green);
    border-radius: 12px;
  }

  .bar-pcts {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .bar-pct-bear {
    font-size: 12px;
    font-weight: 400;
    color: var(--red-spec);
  }

  .bar-votes {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-gray);
    text-align: center;
  }

  .bar-pct-bull {
    font-size: 12px;
    font-weight: 400;
    color: var(--green);
  }

  /* ---- DURATION CTA PILL ---- */
  .duration-cta {
    position: relative;
    display: inline-flex;
    align-items: center;
  }

  .duration-cta-btn {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-gray);
    cursor: pointer;
    background: #1A1E27;
    border: 1px solid #2A2F38;
    border-radius: 20px;
    padding: 4px 10px;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    transition: background 0.12s, border-color 0.12s;
    white-space: nowrap;
  }

  .duration-cta-btn:active { opacity: 0.6; }
  .duration-cta-btn:hover { background: #222836; border-color: #3A3F48; }

  /* Dropdown overlay */
  .duration-dropdown {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    background: #1A1E27;
    border: 1px solid #2A2F38;
    border-radius: 14px;
    padding: 6px;
    flex-direction: column;
    white-space: nowrap;
    z-index: 20;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    min-width: 120px;
  }

  .duration-dropdown.open { display: flex; }

  .duration-option {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-gray);
    background: none;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    -webkit-tap-highlight-color: transparent;
    text-align: left;
    transition: background 0.1s, color 0.1s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .duration-option:hover { background: #222836; color: var(--text-primary); }

  .duration-option.end-prediction {
    color: #E7544D;
  }
  .duration-option.end-prediction:hover {
    background: rgba(231,84,77,0.1);
    color: #E7544D;
  }

  /* Ended state for duration chip */
  .duration-cta-btn.ended {
    color: rgba(148,148,149,0.4);
    border-color: rgba(42,47,56,0.5);
    cursor: default;
    pointer-events: none;
  }

  /* Duration option: selected state (day-0 default) */
  .duration-option.selected {
    color: var(--text-primary);
    background: #222836;
  }

  /* Duration option: Close button (muted/secondary) */
  .duration-option.close-btn {
    color: rgba(148,148,149,0.55);
    font-size: 12px;
    margin-top: 2px;
    border-top: 1px solid rgba(42,47,56,0.6);
    padding-top: 10px;
  }
  .duration-option.close-btn:hover {
    color: rgba(148,148,149,0.8);
    background: rgba(34,40,54,0.5);
  }

  /* Day-0 duration option: inactive */
  .duration-option.day0-opt {
    color: var(--text-gray);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .duration-option.day0-opt .day0-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1.5px solid var(--text-gray);
    flex-shrink: 0;
  }
  .duration-option.day0-opt.selected .day0-dot {
    background: var(--text-primary);
    border-color: var(--text-primary);
  }
  .duration-option.day0-opt.selected {
    color: var(--text-primary);
  }

  /* Select date input hidden but functional */
  .date-input-hidden {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 0;
    height: 0;
  }

  /* ---- TRANSITION ---- */
  .fade-in {
    animation: fadeIn 0.2s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ---- IN-CARD STATE PANELS ---- */
  .card-state {
    transition: opacity 0.3s ease;
  }

  .card-state.state-hidden {
    display: none;
  }

  .card-state.state-fading-out {
    opacity: 0;
    pointer-events: none;
  }

  .card-state.state-fading-in {
    animation: fadeIn 0.3s ease forwards;
  }

  /* =============================================
     POST-VOTE LAYOUT - Two equal side-by-side boxes
     ============================================= */

  .option-b-boxes {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow: visible;
    align-items: stretch;
    /* Flash tint overlay - applied via JS */
    position: relative;
    border-radius: 10px;
  }

  /* Tint overlay for the flash effect - sits over both boxes */
  .boxes-tint-overlay {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    opacity: 0;
    z-index: 2;
    transition: opacity 0.3s ease;
  }

  /* "✓ Final" badge */
  .final-badge {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(106, 198, 76, 0.18);
    border: 1px solid rgba(106, 198, 76, 0.35);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #6AC64C;
    letter-spacing: 0.3px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    z-index: 3;
    transition: opacity 0.3s ease;
  }

  .option-b-box {
    flex: 1;
    background: #1A1D26;
    border: none;
    border-radius: 10px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    justify-content: flex-start;
    align-items: flex-start;
  }

  .option-b-cap-label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-gray);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 4px;
    line-height: 1;
  }

  .option-b-direction {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.4px;
    line-height: 1.2;
    margin-bottom: 3px;
  }

  .option-b-price-dur {
    font-size: 12px;
    font-weight: 400;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: nowrap;
  }

  .option-b-price-text {
    color: var(--text-gray);
  }

  .option-b-pct {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0;
    line-height: 1.1;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .option-b-status {
    font-size: 12px;
    font-weight: 400;
    line-height: 1.3;
  }

  /* ---- PAGE HEADER ---- */
  .page-header {
    padding-top: 12px;
    margin-bottom: 28px;
    text-align: center;
  }

  .page-title {
    font-size: 13px;
    font-weight: 600;
    color: rgba(148,148,149,0.5);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .page-subtitle {
    font-size: 11px;
    color: rgba(148,148,149,0.35);
    margin-top: 2px;
  }

  /* ---- FOOTER ROW ---- */
  .footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ---- POST-VOTE CONTENT wrapper ---- */
  .post-vote-content {
    opacity: 1;
    transition: opacity 0.3s ease;
  }

  .post-vote-content.fading-out {
    opacity: 0;
  }

  /* ---- END PREDICTION EXPANSION PANEL ---- */
  /* Uses position:fixed so getBoundingClientRect coords map 1:1 to top/left */
  .end-panel {
    position: fixed;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    overflow: hidden;
    transition: none;
    cursor: pointer;
  }

  .end-panel.expanding {
    transition:
      top 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      left 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      width 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      height 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      border-radius 0.65s cubic-bezier(0.34, 1.56, 0.64, 1),
      opacity 0.2s ease;
    pointer-events: auto;
  }

  .end-panel.collapsing {
    transition:
      top 0.25s cubic-bezier(0.55, 0, 1, 0.45),
      left 0.25s cubic-bezier(0.55, 0, 1, 0.45),
      width 0.25s cubic-bezier(0.55, 0, 1, 0.45),
      height 0.25s cubic-bezier(0.55, 0, 1, 0.45),
      border-radius 0.25s cubic-bezier(0.55, 0, 1, 0.45),
      opacity 0.2s ease;
    pointer-events: none;
  }

  .end-panel-pct {
    font-size: 40px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 4px;
    color: #fff;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .end-panel-pct.visible {
    opacity: 1;
  }

  .end-panel-label {
    font-size: 17px;
    font-weight: 500;
    color: #fff;
    opacity: 0;
    transition: opacity 0.3s ease;
    text-align: center;
  }

  .end-panel-label.visible {
    opacity: 1;
  }

  /* Confetti canvas sits inside the panel */
  #confetti-canvas {
    position: absolute;
    inset: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>

<div class="page">

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-title">Sentiments Redesign</div>
    <div class="page-subtitle">Tap Bear or Bull to cast a vote</div>
  </div>

  <!-- ===================================
       SINGLE COMMUNITY SENTIMENTS CARD
       =================================== -->
  <div class="card" id="pre-vote-card" style="position:relative; padding: 16px 16px 20px; overflow: visible;">

    <!-- Card title: fixed, never transitions -->
    <div class="card-title">Community Sentiments</div>

    <!-- End prediction expansion panel (positioned via JS, inside single card) -->
    <div class="end-panel" id="end-panel" onclick="collapseEndPanel()">
      <canvas id="confetti-canvas"></canvas>
      <div class="end-panel-pct" id="end-panel-pct"></div>
      <div class="end-panel-label" id="end-panel-label"></div>
    </div>

    <!-- PRE-VOTE STATE -->
    <div class="card-state" id="pre-vote-inner">
      <!-- Text block: centered, question + hint -->
      <div style="display:flex; flex-direction:column; gap:6px; align-items:center; margin-bottom:16px;">
        <div class="prevote-question">Where is AAPL headed?</div>
        <div class="prevote-hint">Vote to see community results</div>
      </div>

      <!-- Circular vote buttons -->
      <div class="vote-buttons" style="margin-bottom:16px;">
        <!-- Bear: red border circle -->
        <button class="vote-btn bear" onclick="castVote('bear')">

        </button>

<script>
  // ---- SVG arrow helpers ----
  function arrowUp(color) {
    return `<svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0; display:inline-block; vertical-align:middle; margin-right:2px;"><path d="M7 13V3M7 3L3 7M7 3L11 7" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }
  function arrowDown(color) {
    return `<svg width="14" height="16" viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0; display:inline-block; vertical-align:middle; margin-right:2px;"><path d="M7 3V13M7 13L3 9M7 13L11 9" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  }

  // ---- State ----
  let currentVote = null;
  let daysLeft = 27;
  let endPanelTimer = null;
  let isDay0 = false; // true = just voted, show day-0 picker; false = returning user, show returning picker
  let day0SelectedDays = 30; // default selected in day-0 picker

  function castVote(direction) {
    currentVote = direction;
    isDay0 = true; // Fresh vote = day 0
    day0SelectedDays = 30; // Reset default selection
    const isBull = direction === 'bull';
    const colorGreen = '#6AC64C';
    const colorRed = '#E7544D';
    const color = isBull ? colorGreen : colorRed;
    const pctNum = isBull ? '4.57%' : '-1.23%';
    const arrow = isBull ? arrowUp(color) : arrowDown(color);
    const pctHTML = `${arrow}<span style="color:#FFFFFF;">${pctNum}</span>`;
    const status = isBull ? 'On track' : 'Behind';
    const dirLabel = isBull ? 'Bullish' : 'Bearish';

    // Populate post-vote fields
    const bDir = document.getElementById('b-direction');
    bDir.textContent = dirLabel;
    bDir.style.color = color;
    document.getElementById('b-pct').innerHTML = pctHTML;
    const bStatus = document.getElementById('b-status');
    bStatus.textContent = status;
    bStatus.style.color = color;
    document.getElementById('b-bear-icon').style.opacity = '0.3';
    document.getElementById('b-bull-icon').style.opacity = '1';

    // Day 0: chip shows "30D ›" (just set)
    daysLeft = 30;
    document.getElementById('dur-label-b').textContent = '30D ›';
    const btn = document.getElementById('dur-btn-b');
    btn.classList.remove('ended');
    btn.style.pointerEvents = '';

    // Reset day-0 picker selection visual
    resetDay0Selection(30);

    // Cross-fade: fade out pre-vote, fade in post-vote within same card
    const preInner = document.getElementById('pre-vote-inner');
    const postInner = document.getElementById('post-vote-inner');

    // Fade out pre-vote content
    preInner.style.transition = 'opacity 0.25s ease';
    preInner.style.opacity = '0';

    setTimeout(() => {
      preInner.classList.add('state-hidden');
      preInner.style.opacity = '';
      preInner.style.transition = '';

      // Show post-vote with fade-in
      postInner.classList.remove('state-hidden');
      postInner.style.opacity = '0';
      postInner.style.transition = 'opacity 0.3s ease';
      // Reset post-vote-content opacity in case it was faded by end-panel
      const postVoteContent = document.getElementById('post-vote-content');
      postVoteContent.style.transition = 'none';
      postVoteContent.style.opacity = '1';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          postInner.style.opacity = '1';
        });
      });

      setTimeout(() => {
        postInner.style.opacity = '';
        postInner.style.transition = '';
      }, 350);
    }, 250);
  }

  function resetDay0Selection(days) {
    const opts = document.querySelectorAll('#picker-day0 .day0-opt');
    opts.forEach(o => o.classList.remove('selected'));
    const match = document.querySelector(`#picker-day0 .day0-opt[data-days="${days}"]`);
    if (match) match.classList.add('selected');
  }

  function toggleDuration() {
    // Which picker to show depends on state
    const pickerDay0 = document.getElementById('picker-day0');
    const pickerReturning = document.getElementById('picker-b');

    if (isDay0) {
      const isOpen = pickerDay0.classList.contains('open');
      pickerDay0.classList.toggle('open', !isOpen);
      pickerReturning.classList.remove('open');
    } else {
      const isOpen = pickerReturning.classList.contains('open');
      pickerReturning.classList.toggle('open', !isOpen);
      pickerDay0.classList.remove('open');
    }
  }

  function closeDuration() {
    document.getElementById('picker-b').classList.remove('open');
    document.getElementById('picker-day0').classList.remove('open');
  }

  function selectDay0Duration(days) {
    day0SelectedDays = days;
    daysLeft = days;
    // Update chip label to reflect chosen duration (still day 0 feel)
    document.getElementById('dur-label-b').textContent = days + 'D ›';
    // Update selection visual
    resetDay0Selection(days);
    // Transition to returning-user mode after picking
    // Small delay so user sees the selection flash, then close
    setTimeout(() => {
      closeDuration();
      // Now switch to returning-user mode with days-left chip
      isDay0 = false;
      // Simulate a bit of time: chip now shows "Xd left ›"
      document.getElementById('dur-label-b').textContent = daysLeft + 'D left ›';
    }, 180);
  }

  function openDatePicker(context) {
    const inputId = context === 'day0' ? 'date-input-day0' : 'date-input-returning';
    const input = document.getElementById(inputId);
    input.style.pointerEvents = 'auto';
    input.click();
    setTimeout(() => { input.style.pointerEvents = 'none'; }, 500);
  }

  function onDateSelected(input, context) {
    const val = input.value;
    if (!val) return;
    const d = new Date(val);
    const today = new Date();
    today.setHours(0,0,0,0);
    const diffMs = d - today;
    const diffDays = Math.max(1, Math.round(diffMs / 86400000));
    daysLeft = diffDays;
    document.getElementById('dur-label-b').textContent = diffDays + 'D left ›';
    closeDuration();
    // After a date selection, switch to returning-user mode
    isDay0 = false;
    input.value = '';
  }

  function selectDuration(code) {
    const labelEl = document.getElementById('dur-label-b');
    const btn = document.getElementById('dur-btn-b');

    if (code === '7more') {
      daysLeft += 7;
      labelEl.textContent = daysLeft + 'D left ›';
      closeDuration();
      return;
    }
    if (code === '30more') {
      daysLeft += 30;
      labelEl.textContent = daysLeft + 'D left ›';
      closeDuration();
      return;
    }

    // ---- "End prediction" ----
    closeDuration();
    btn.classList.add('ended');
    labelEl.textContent = 'Ended';

    const isWin = currentVote === 'bull';
    triggerEndPanel(isWin);
  }

  // ---- END PANEL EXPANSION ----
  function triggerEndPanel(isWin) {
    const card = document.getElementById('pre-vote-card');
    const boxesContainer = document.getElementById('boxes-container');
    const rightBox = boxesContainer.querySelectorAll('.option-b-box')[1]; // "SINCE YOUR VOTE" box
    const postVoteContent = document.getElementById('post-vote-content');
    const panel = document.getElementById('end-panel');
    const pctEl = document.getElementById('end-panel-pct');
    const labelEl = document.getElementById('end-panel-label');

    // --- Populate panel content ---
    const colorGreen = '#6AC64C';
    const colorRed = '#E7544D';

    if (isWin) {
      const arrow = arrowUp(colorGreen);
      pctEl.innerHTML = `${arrow}<span style="color:${colorGreen};">4.57%</span>`;
    } else {
      const arrow = arrowDown(colorRed);
      pctEl.innerHTML = `${arrow}<span style="color:${colorRed};">1.23%</span>`;
    }

    labelEl.textContent = isWin ? 'Amazing!' : 'Not this time';
    labelEl.classList.remove('visible');
    pctEl.classList.remove('visible');
    panel.style.background = 'var(--bg-card)';
    panel.style.border = 'none';

    // --- Capture positions using getBoundingClientRect for true viewport coords ---
    // The panel is position:fixed, so top/left map directly to viewport coords.
    const sourceRect = rightBox.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    const titleEl = card.querySelector('.card-title');
    const titleRect = titleEl.getBoundingClientRect();

    // Source: the exact screen position & size of the SINCE YOUR VOTE box
    const srcTop = sourceRect.top;
    const srcLeft = sourceRect.left;
    const srcW = sourceRect.width;
    const srcH = sourceRect.height;

    // Target: full card content area below the title, in viewport coords
    const targetTop = titleRect.bottom + 12;
    const targetLeft = cardRect.left + 16;
    const targetW = cardRect.width - 32;
    const targetH = (cardRect.bottom - 16) - targetTop; // card bottom minus padding

    // --- Step 1: Snap panel to exact source position (no transition) ---
    panel.style.transition = 'none';
    panel.classList.remove('expanding', 'collapsing');
    panel.style.top = srcTop + 'px';
    panel.style.left = srcLeft + 'px';
    panel.style.width = srcW + 'px';
    panel.style.height = srcH + 'px';
    panel.style.borderRadius = '10px';
    panel.style.opacity = '1';

    // Force reflow so browser commits the initial state before we add the transition
    void panel.getBoundingClientRect();

    // --- Step 2: Fade out post-vote content simultaneously ---
    postVoteContent.style.transition = 'opacity 0.2s ease';
    postVoteContent.style.opacity = '0';

    // --- Step 3: Begin expansion to target in next paint ---
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        panel.classList.add('expanding');
        panel.style.top = targetTop + 'px';
        panel.style.left = targetLeft + 'px';
        panel.style.width = targetW + 'px';
        panel.style.height = targetH + 'px';
        panel.style.borderRadius = '0px';
      });
    });

    // --- Step 4: Fade in panel content after expansion is mostly complete ---
    setTimeout(() => {
      pctEl.classList.add('visible');
    }, 500);

    setTimeout(() => {
      labelEl.classList.add('visible');
      if (isWin) {
        launchConfetti();
      }
    }, 650);

    // Auto-collapse after 5s (from when expansion starts)
    if (endPanelTimer) clearTimeout(endPanelTimer);
    endPanelTimer = setTimeout(() => {
      collapseEndPanel();
    }, 5000);
  }

  function collapseEndPanel() {
    if (endPanelTimer) {
      clearTimeout(endPanelTimer);
      endPanelTimer = null;
    }

    const panel = document.getElementById('end-panel');
    const postVoteContent = document.getElementById('post-vote-content');
    const labelEl = document.getElementById('end-panel-label');
    const pctEl = document.getElementById('end-panel-pct');
    const btn = document.getElementById('dur-btn-b');

    // Instantly hide panel content, stop confetti
    labelEl.style.transition = 'none';
    pctEl.style.transition = 'none';
    labelEl.classList.remove('visible');
    pctEl.classList.remove('visible');
    stopConfetti();

    // Collapse panel quickly (~250ms) then fade back to pre-vote within same card
    panel.classList.remove('expanding');
    panel.classList.add('collapsing');
    panel.style.opacity = '0';

    // After panel collapses, cross-fade post-vote -> pre-vote (total ~300ms)
    setTimeout(() => {
      // Reset panel
      panel.style.transition = 'none';
      panel.classList.remove('collapsing');
      panel.style.opacity = '0';

      // Restore post-vote content opacity instantly
      postVoteContent.style.transition = 'none';
      postVoteContent.style.opacity = '1';

      // Cross-fade back to pre-vote state within same card
      const preInner = document.getElementById('pre-vote-inner');
      const postInner = document.getElementById('post-vote-inner');

      // Fade out post-vote
      postInner.style.transition = 'opacity 0.25s ease';
      postInner.style.opacity = '0';

      setTimeout(() => {
        postInner.classList.add('state-hidden');
        postInner.style.opacity = '';
        postInner.style.transition = '';

        // Fade in pre-vote
        preInner.classList.remove('state-hidden');
        preInner.style.opacity = '0';
        preInner.style.transition = 'opacity 0.3s ease';

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            preInner.style.opacity = '1';
          });
        });

        setTimeout(() => {
          preInner.style.opacity = '';
          preInner.style.transition = '';
        }, 350);

        // Reset chip and state
        const labelChip = document.getElementById('dur-label-b');
        btn.classList.remove('ended');
        daysLeft = 27;
        isDay0 = false;
        labelChip.textContent = '27D left ›';
        currentVote = null;

        // Reset text transitions
        labelEl.style.transition = '';
        pctEl.style.transition = '';
      }, 250);
    }, 300);
  }

  // ---- CONFETTI ----
  let confettiAnimId = null;
  let confettiParticles = [];

  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const panel = document.getElementById('end-panel');
    const panelW = panel.offsetWidth;
    const panelH = panel.offsetHeight;
    canvas.width = panelW;
    canvas.height = panelH;
    const ctx = canvas.getContext('2d');

    const colors = ['#6AC64C', '#9BE07A', '#FFFFFF', '#B5F09A', '#4CAF30', '#D4F5C0'];
    const count = 60;
    confettiParticles = [];

    for (let i = 0; i < count; i++) {
      confettiParticles.push({
        x: Math.random() * panelW,
        y: -10 - Math.random() * 40,
        w: 5 + Math.random() * 6,
        h: 4 + Math.random() * 4,
        color: colors[Math.floor(Math.random() * colors.length)],
        vx: (Math.random() - 0.5) * 2.5,
        vy: 2 + Math.random() * 3.5,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.18,
        alpha: 1,
        decay: 0.008 + Math.random() * 0.006
      });
    }

    const startTime = performance.now();
    const duration = 3800; // ms - extended to fill the longer hold time

    function draw(now) {
      const elapsed = now - startTime;
      ctx.clearRect(0, 0, panelW, panelH);

      let alive = false;
      for (const p of confettiParticles) {
        if (p.alpha <= 0) continue;
        alive = true;
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.07; // gravity
        p.rot += p.rotV;
        // Start fading after 60% duration
        if (elapsed > duration * 0.6) {
          p.alpha -= p.decay;
        }

        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }

      if (alive && elapsed < duration + 800) {
        confettiAnimId = requestAnimationFrame(draw);
      } else {
        ctx.clearRect(0, 0, panelW, panelH);
      }
    }

    if (confettiAnimId) cancelAnimationFrame(confettiAnimId);
    confettiAnimId = requestAnimationFrame(draw);
  }

  function stopConfetti() {
    if (confettiAnimId) {
      cancelAnimationFrame(confettiAnimId);
      confettiAnimId = null;
    }
    const canvas = document.getElementById('confetti-canvas');
    if (canvas) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    confettiParticles = [];
  }

  // ---- Close dropdowns when tapping outside ----
  document.addEventListener('click', function(e) {
    if (!e.target.closest('.duration-cta')) {
      closeDuration();
    }
  });
</script>
